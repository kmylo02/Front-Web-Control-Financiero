<div class="app-shell" [class.sidebar-collapsed]="!sidebarOpen">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon-box">
        <svg viewBox="0 0 28 28" width="22" height="22" xmlns="http://www.w3.org/2000/svg">
          <rect x="2"  y="17" width="6" height="9"  rx="1.5" fill="white" opacity="0.92"/>
          <rect x="11" y="11" width="6" height="15" rx="1.5" fill="white" opacity="0.92"/>
          <rect x="20" y="5"  width="6" height="21" rx="1.5" fill="white" opacity="0.92"/>
          <polyline points="5,17 14,11 23,5" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="23" cy="5" r="2" fill="white" opacity="0.95"/>
        </svg>
      </div>
      <span class="logo-text">ControlFin</span>
    </div>

    <nav class="sidebar-nav">
      <a *ngFor="let item of navItems"
         [routerLink]="item.path"
         routerLinkActive="active"
         class="nav-item">
        <span class="nav-icon">{{ item.icon }}</span>
        <span class="nav-label">{{ item.label }}</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="user-info">
        <div class="avatar">{{ user?.name?.charAt(0)?.toUpperCase() }}</div>
        <div class="user-details">
          <span class="user-name">{{ user?.name }}</span>
          <span class="user-email">{{ user?.email }}</span>
        </div>
      </div>
      <button class="btn btn-ghost btn-sm" (click)="logout()">Salir</button>
    </div>
  </aside>

  <!-- Main -->
  <div class="main-area">
    <header class="app-header">
      <button class="btn btn-ghost btn-icon" (click)="toggleSidebar()">☰</button>
      <div class="header-right">
        <a routerLink="/notifications" class="notif-btn">
          🔔
          <span class="notif-badge" *ngIf="(unreadCount$ | async) as count">{{ count }}</span>
        </a>
      </div>
    </header>

    <main class="page-content">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
