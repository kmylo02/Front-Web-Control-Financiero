<div class="app-shell" [class.sidebar-collapsed]="!sidebarOpen">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="36" height="36" class="logo-svg">
        <defs>
          <linearGradient id="cfg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#4f46e5"/>
            <stop offset="100%" stop-color="#16a34a"/>
          </linearGradient>
        </defs>
        <rect width="40" height="40" rx="10" fill="url(#cfg)"/>
        <rect x="6" y="25" width="7" height="10" rx="2" fill="rgba(255,255,255,0.88)"/>
        <rect x="16" y="18" width="7" height="17" rx="2" fill="rgba(255,255,255,0.88)"/>
        <rect x="26" y="10" width="7" height="25" rx="2" fill="rgba(255,255,255,0.88)"/>
        <polyline points="9,25 19,18 29,10" stroke="rgba(255,255,255,0.45)" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="29" cy="10" r="2.5" fill="white" opacity="0.9"/>
      </svg>
      <span class="logo-text">ControlFin</span>
    </div>

    <nav class="sidebar-nav">
      <a *ngFor="let item of navItems"
         [routerLink]="item.path"
         routerLinkActive="active"
         class="nav-item">
        <span class="nav-icon">{{ item.icon }}</span>
        <span class="nav-label">{{ item.label }}</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="user-info">
        <div class="avatar">{{ user?.name?.charAt(0)?.toUpperCase() }}</div>
        <div class="user-details">
          <span class="user-name">{{ user?.name }}</span>
          <span class="user-email">{{ user?.email }}</span>
        </div>
      </div>
      <button class="btn btn-ghost btn-sm" (click)="logout()">Salir</button>
    </div>
  </aside>

  <!-- Main -->
  <div class="main-area">
    <header class="app-header">
      <button class="btn btn-ghost btn-icon" (click)="toggleSidebar()">☰</button>
      <div class="header-right">
        <a routerLink="/notifications" class="notif-btn">
          🔔
          <span class="notif-badge" *ngIf="(unreadCount$ | async) as count">{{ count }}</span>
        </a>
      </div>
    </header>

    <main class="page-content">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
