<div class="page-header">
  <div>
    <h1>Ingresos</h1>
    <p class="text-muted">Total: <strong class="text-success">{{ formatCurrency(total) }}</strong></p>
  </div>
  <button class="btn btn-success" (click)="openNew()">+ Nuevo ingreso</button>
</div>

<div class="month-nav card mb-24">
  <button class="btn btn-ghost btn-icon" (click)="changeMonth(-1)">‹</button>
  <span class="month-label">{{ monthName }} {{ year }}</span>
  <button class="btn btn-ghost btn-icon" (click)="changeMonth(1)">›</button>
</div>

<div *ngIf="loading" class="spinner"></div>

<div *ngIf="!loading" class="card">
  <div *ngIf="incomes.length; else empty" class="table-wrap">
    <table>
      <thead>
        <tr><th>Descripción</th><th>Fecha</th><th>Monto</th><th></th></tr>
      </thead>
      <tbody>
        <tr *ngFor="let inc of incomes">
          <td>{{ inc.description }}</td>
          <td>{{ inc.date | date:'d MMM yyyy' }}</td>
          <td class="fw-600 text-success">{{ formatCurrency(inc.amount) }}</td>
          <td>
            <div class="d-flex gap-8 justify-end">
              <button class="btn btn-ghost btn-icon btn-sm" (click)="openEdit(inc)">✏️</button>
              <button class="btn btn-ghost btn-icon btn-sm" (click)="delete(inc._id)">🗑️</button>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
  <ng-template #empty>
    <div class="empty-state">
      <div class="empty-icon">💵</div>
      <h3>Sin ingresos en {{ monthName }}</h3>
    </div>
  </ng-template>
</div>

<div class="modal-overlay" *ngIf="showModal" (click)="closeModal()">
  <div class="modal" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h2>{{ editingId ? 'Editar ingreso' : 'Nuevo ingreso' }}</h2>
      <button class="btn btn-ghost btn-icon" (click)="closeModal()">✕</button>
    </div>
    <form [formGroup]="form" (ngSubmit)="save()">
      <div class="form-group"><label>Descripción</label><input formControlName="description" /></div>
      <div class="form-row">
        <div class="form-group"><label>Monto</label><input type="number" formControlName="amount" min="1" /></div>
        <div class="form-group"><label>Fecha</label><input type="date" formControlName="date" /></div>
      </div>
      <div class="form-group">
        <label>Categoría</label>
        <select formControlName="categoryId">
          <option value="">Selecciona categoría</option>
          <option *ngFor="let cat of categories" [value]="cat._id">{{ cat.name }}</option>
        </select>
        <div class="quick-cat-toggle">
          <button type="button" class="btn-link" (click)="toggleQuickCat()">
            {{ showQuickCat ? '✕ Cancelar' : '+ Nueva categoría' }}
          </button>
        </div>
        <div *ngIf="showQuickCat" class="quick-cat-form">
          <input #quickCatInput placeholder="Nombre de la categoría" (keyup.enter)="createQuickCat(quickCatInput.value, quickCatInput)" />
          <button type="button" class="btn btn-success btn-sm" (click)="createQuickCat(quickCatInput.value, quickCatInput)">Crear</button>
        </div>
      </div>
      <div class="form-group"><label>Notas</label><input formControlName="notes" /></div>
      <div class="modal-footer">
        <button type="button" class="btn btn-outline" (click)="closeModal()">Cancelar</button>
        <button type="submit" class="btn btn-success" [disabled]="form.invalid || saving">
          {{ saving ? 'Guardando...' : 'Guardar' }}
        </button>
      </div>
    </form>
  </div>
</div>
