<div class="auth-container">
  <div class="auth-card">
    <div class="auth-logo">
      <span class="logo-icon">💰</span>
      <h1>Control Financiero</h1>
      <p>Administra tus finanzas personales</p>
    </div>

    <div *ngIf="error" class="alert alert-danger">{{ error }}</div>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="form-group">
        <label>Correo electrónico</label>
        <input type="email" formControlName="email" placeholder="tu@correo.com" />
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" formControlName="password" placeholder="••••••••" />
      </div>
      <button type="submit" class="btn btn-primary btn-full" [disabled]="form.invalid || loading">
        {{ loading ? 'Ingresando...' : 'Iniciar sesión' }}
      </button>
    </form>

    <p class="auth-link">
      ¿No tienes cuenta? <a routerLink="/auth/register">Regístrate</a>
    </p>
  </div>
</div>
